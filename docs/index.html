<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>班表</title>
  <link rel="stylesheet" href="./styles.css?v=20260630172945">
</head>
<body>
  <div class="app-shell">
    <section class="toolbar-card toolbar-floating-card">
      <div class="toolbar-top-row">
        <button class="ghost-btn toolbar-collapse-toggle" id="toolbarCollapseToggle" type="button" aria-expanded="true" aria-label="收合工具列" title="收合工具列">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M6 15l6-6 6 6"></path>
          </svg>
        </button>
        <h2 class="toolbar-main-title">班表</h2>
        <div id="authBar" class="auth-bar"></div>
        <p id="dbHint" class="db-hint"></p>
        <div class="core-actions-shell" id="coreActionsShell">
          <button class="ghost-btn core-actions-toggle" id="coreActionsToggle" type="button">功能</button>
          <div class="core-actions-menu" id="coreActionsMenu" aria-hidden="true">
            <button class="ghost-btn ops-btn" id="leaveApprovalButton" type="button">請假審核</button>
            <button class="ghost-btn ops-btn" id="overtimeApprovalButton" type="button">加班審核</button>
            <button class="ghost-btn ops-btn" id="weekStartSettingsButton" type="button">週期設定</button>
            <button class="ghost-btn ops-btn" id="autoSchedulePreviewButton" type="button">自動排班預覽</button>
            <button class="primary-btn ops-btn" id="autoScheduleApplyButton" type="button">套用預覽</button>
            <button class="ghost-btn ops-btn" id="autoScheduleCancelButton" type="button">取消預覽</button>
            <button class="primary-btn ops-btn" id="exportSapButton" type="button">匯出休例假</button>
            <button class="primary-btn ops-btn" id="exportLeaveButton" type="button">匯出請假</button>
            <button class="primary-btn ops-btn" id="exportOvertimeButton" type="button">匯出加班</button>
          </div>
        </div>
        <div id="signOutSlot" class="top-signout-slot"></div>
      </div>

      <div class="toolbar-grid" id="toolbarGrid" style="display:none">
        <div class="toolbar-section toolbar-section-combined">
          <div class="toolbar-title-row toolbar-title-row-combined">
            <span class="toolbar-title">班別</span>
            <select id="deptFilter"></select>
            <button class="settings-icon-btn toolbar-settings-btn" id="shiftSettingsButton" type="button" aria-label="班別設定" title="班別設定">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M4 20h4l10-10a2 2 0 0 0-4-4L4 16v4z"></path>
                <path d="M13.5 6.5l4 4"></path>
              </svg>
            </button>
          </div>
          <div id="shiftChips" class="chips chips-shift"></div>
        </div>

        <div class="toolbar-section toolbar-section-leave">
          <div class="toolbar-title-row">
            <span class="toolbar-title">假別</span>
            <button class="ghost-btn compact-btn toolbar-inline-action" id="restComplianceButton" type="button">例休檢查</button>
            <button class="settings-icon-btn toolbar-settings-btn" id="leaveSettingsButton" type="button" aria-label="假別設定" title="假別設定">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M4 20h4l10-10a2 2 0 0 0-4-4L4 16v4z"></path>
                <path d="M13.5 6.5l4 4"></path>
              </svg>
            </button>
          </div>
          <div id="leaveChips" class="chips"></div>
        </div>

        <div class="toolbar-section toolbar-section-overtime">
          <div class="toolbar-title-row">
            <span class="toolbar-title">加班</span>
            <button class="settings-icon-btn toolbar-settings-btn" id="overtimeSettingsButton" type="button" aria-label="加班設定" title="加班設定">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M4 20h4l10-10a2 2 0 0 0-4-4L4 16v4z"></path>
                <path d="M13.5 6.5l4 4"></path>
              </svg>
            </button>
          </div>
          <div id="overtimeChips" class="chips"></div>
        </div>

      </div>
    </section>

    <section class="calendar-card">
      <div class="calendar-nav">
        <div class="calendar-nav-left">
          <select id="tableViewSelect" aria-label="班表檢視">
            <option value="member">人員檢視</option>
            <option value="shift">班別檢視</option>
          </select>
          <select id="tableDeptScopeFilter" aria-label="班表顯示範圍"></select>
          <select id="tableStatsSelect" aria-label="統計欄顯示">
            <option value="show">顯示統計</option>
            <option value="hide">隱藏統計</option>
          </select>
        </div>
        <div class="month-title-wrap">
          <h2 id="monthTitle"></h2>
        </div>
        <div class="nav-actions">
          <button class="nav-btn" id="prevPeriodButton" type="button">前八週</button>
          <button class="nav-btn" id="prevWeekButton" type="button">前一週</button>
          <button class="nav-btn" id="nextWeekButton" type="button">後一週</button>
          <button class="nav-btn" id="nextPeriodButton" type="button">後八週</button>
        </div>
      </div>

      <div class="table-sticky-header" id="tableStickyHeader">
        <div class="table-sticky-header-left">
          <div class="table-sticky-cell table-sticky-cell-dept">單位</div>
          <div class="table-sticky-cell table-sticky-cell-person">人員</div>
          <div class="table-sticky-cell table-sticky-cell-stats">統計</div>
        </div>
        <div class="table-sticky-header-scroll">
          <div class="table-sticky-header-days" id="tableStickyHeaderDays"></div>
        </div>
      </div>

      <div class="table-wrap" id="tableWrap">
        <table id="mainTable"></table>
      </div>
    </section>
  </div>

  <div id="modalRoot"></div>
  <div id="authRoot"></div>

  <script src="https://cdn.jsdelivr.net/npm/exceljs@4.4.0/dist/exceljs.min.js"></script>
  <script src="./app-config.js?v=20260630172945"></script>
  <script src="./browser-exporter.js?v=20260630172945"></script>
  <script src="./rest-compliance.js?v=20260630172945"></script>
  <script src="./web-api.js?v=20260630172945"></script>
  <script src="./renderer.js?v=20260630172945"></script>
</body>
</html>
