<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>排班工具</title>
  <link rel="stylesheet" href="./styles.css?v=20260622m">
</head>
<body>
  <div class="app-shell">
    <section class="toolbar-card toolbar-floating-card">
      <div class="toolbar-top-row">
        <h2 class="toolbar-main-title">排班工具</h2>
        <div id="authBar" class="auth-bar"></div>
        <p id="dbHint" class="db-hint"></p>
        <div class="core-actions-shell" id="coreActionsShell">
          <button class="ghost-btn core-actions-toggle" id="coreActionsToggle" type="button">核心功能</button>
          <div class="core-actions-menu" id="coreActionsMenu" aria-hidden="true">
            <button class="ghost-btn ops-btn" id="leaveApprovalButton" type="button">請假審核</button>
            <button class="ghost-btn ops-btn" id="overtimeApprovalButton" type="button">加班審核</button>
            <button class="ghost-btn ops-btn" id="memberSettingsButton" type="button">人員設定</button>
            <button class="primary-btn ops-btn" id="exportSapButton" type="button">匯出休例假</button>
            <button class="primary-btn ops-btn" id="exportLeaveButton" type="button">匯出請假</button>
            <button class="primary-btn ops-btn" id="exportOvertimeButton" type="button">匯出加班</button>
          </div>
        </div>
      </div>

      <div class="toolbar-grid" id="toolbarGrid" style="display:none">
        <div class="toolbar-section toolbar-section-combined">
          <div class="toolbar-title-row">
            <span class="toolbar-title">單位 / 班別</span>
            <div class="toolbar-action-group">
              <button class="text-btn" id="deptSettingsButton" type="button">單位設定</button>
              <button class="text-btn" id="shiftSettingsButton" type="button">班別設定</button>
            </div>
          </div>
          <div class="dept-filter-row">
            <select id="deptFilter"></select>
          </div>
          <div id="shiftChips" class="chips"></div>
        </div>

        <div class="toolbar-section">
          <div class="toolbar-title-row">
            <span class="toolbar-title">假別</span>
            <button class="text-btn" id="leaveSettingsButton" type="button">設定</button>
          </div>
          <div id="leaveChips" class="chips"></div>
        </div>

      </div>
    </section>

    <section class="calendar-card">
      <div class="calendar-nav">
        <button class="nav-btn" id="prevMonthButton" type="button">上一月</button>
        <div class="month-title-wrap">
          <h2 id="monthTitle"></h2>
        </div>
        <div class="nav-actions">
          <button class="nav-btn" id="nextMonthButton" type="button">下一月</button>
        </div>
      </div>

      <div class="table-sticky-header" id="tableStickyHeader" aria-hidden="true">
        <div class="table-sticky-header-left">
          <div class="table-sticky-cell table-sticky-cell-dept">單位</div>
          <div class="table-sticky-cell table-sticky-cell-person">人員</div>
        </div>
        <div class="table-sticky-header-scroll">
          <div class="table-sticky-header-days" id="tableStickyHeaderDays"></div>
        </div>
      </div>

      <div class="table-wrap" id="tableWrap">
        <table id="mainTable"></table>
      </div>
    </section>
  </div>

  <div id="modalRoot"></div>
  <div id="authRoot"></div>

  <script src="https://cdn.jsdelivr.net/npm/exceljs@4.4.0/dist/exceljs.min.js"></script>
  <script src="./app-config.js?v=20260622m"></script>
  <script src="./browser-exporter.js?v=20260622m"></script>
  <script src="./web-api.js?v=20260622m"></script>
  <script src="./renderer.js?v=20260622m"></script>
</body>
</html>
